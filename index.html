<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotis & Aspa Wedding</title>

    <!-- Alpine CDN -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Custom Colors -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              weddingButton: '#AEB784',
              weddingButtonHover: '#9DA46F',
              weddingText: '#3E2C23',
            }
          }
        }
      }
    </script>
</head>

<body class="bg-gray-50 text-weddingText">
    <div class="min-h-screen flex flex-col items-center justify-between">

        <!-- HEADER DECORATION -->
        <img 
            class="w-auto h-20 md:h-24 object-contain"
            src="images/header.png" 
            alt="header"
        />

        <!-- HERO -->
        <section class="flex flex-col items-center justify-center text-center px-6">

            <p class="tracking-widest text-sm mb-2 text-weddingText">OUR WEDDING</p>

            <!-- IMAGE INSTEAD OF TEXT -->
            <img 
                src="images/logo.png" 
                alt="Fotis & Aspa"
                class="w-64 md:w-80 mb-4"
            />

            <p class="tracking-widest text-md mb-2 text-weddingText">19 Απρ 2026 | 12:30 μμ</p>

            <p class="tracking-widest text-md mb-4 text-weddingText">ΚΤΗΜΑ ΚΛΕΟΠΑΤΡΑ</p>

            <!-- BUTTONS -->
            <div class="flex flex-col gap-4 w-full max-w-md">

                <!-- RSVP -->
                <a 
                    class="w-full py-3 rounded-lg font-medium shadow bg-weddingButton text-weddingText hover:bg-weddingButtonHover transition"
                    id="rsvp"
                    href="https://forms.cloud.microsoft/Pages/ResponsePage.aspx?id=DQSIkWdsW0yxEjajBLZtrQAAAAAAAAAAAANAAbB2mktUM1NHTUVNTTFOSUMxTVNaSElXRTRQQ0ozNy4u"
                    target="_blank"
                >
                    ΘΑ ΠΑΡΕΥΡΕΘΩ (RSVP)
                </a>

                <!-- LOCATION -->
                <a 
                    class="w-full py-3 rounded-lg font-medium shadow bg-weddingButton text-weddingText hover:bg-weddingButtonHover transition"
                    id="location"
                    href="https://maps.app.goo.gl/g2fAXXB2CWkKJXZ98"
                    target="_blank"
                >
                    ΤΟΠΟΘΕΣΙΑ
                </a>

                <!-- MEMORIES with countdown -->
                <div 
                    class="w-full"
                    x-data="{
                        weddingDate: new Date('2026-04-19T12:30:00'),
                        now: new Date(),
                        tick() {
                            this.now = new Date();
                        },
                        get diff() {
                            return this.weddingDate - this.now;
                        },
                        get isActive() {
                            return this.diff <= 0;
                        },
                        get days() {
                            return Math.floor(this.diff / (1000 * 60 * 60 * 24));
                        },
                        get hours() {
                            return Math.floor((this.diff / (1000 * 60 * 60)) % 24);
                        },
                        get minutes() {
                            return Math.floor((this.diff / (1000 * 60)) % 60);
                        },
                        get seconds() {
                            return Math.floor((this.diff / 1000) % 60);
                        }
                    }"
                    x-init="setInterval(() => tick(), 1000)"
                >
                    <a 
                        class="w-full flex items-center justify-center py-3 rounded-lg font-medium shadow transition bg-weddingButton text-weddingText hover:bg-weddingButtonHover"
                        id="memories"
                        :class="!isActive ? 'opacity-50 cursor-not-allowed' : ''"
                        :href="isActive ? 'https://your-link-here.com' : '#'"
                        :target="isActive ? '_blank' : ''"
                    >
                        <!-- ACTIVE -->
                        <span x-show="isActive">
                            ΦΩΤΟΓΡΑΦΙΕΣ & ΒΙΝΤΕΟ
                        </span>

                        <!-- COUNTDOWN -->
                        <span x-show="!isActive">
                            Διαθέσιμο σε 
                            <span x-text="days"></span>η 
                            <span x-text="hours"></span>ω 
                            <span x-text="minutes"></span>λ 
                            <span x-text="seconds"></span>δ
                        </span>
                    </a>
                </div>

            </div>

        </section>

        <!-- FOOTER DECORATION -->
        <img 
            class="w-auto h-20 md:h-24 object-contain"
            src="images/footer.png" 
            alt="footer"
        />
    </div>
</body>
</html>
